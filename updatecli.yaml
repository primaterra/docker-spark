name: Bump Databricks minimal base image

sources:
  databricks:
    kind: dockerimage
    spec:
      image: databricksruntime/minimal
      tagfilter: ^\d+\.\d+-LTS$
      versionfilter:
        kind: regex/semver
        regex: '^(\d+\.\d+)-LTS$'
        pattern: '*'

targets:
  dockerfile:
    kind: dockerfile
    sourceid: databricks
    spec:
      file: docker/Dockerfile
      instruction:
        keyword: FROM
        matcher: docker.io/databricksruntime/minimal
